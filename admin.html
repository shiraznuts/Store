<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پنل مدیریت | Shiraz Nuts</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: Tahoma, Arial, sans-serif;
    background: #0f0f10;
    color: #eee;
    margin: 0;
    padding: 0;
  }
  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  #login-screen h1 { color: #d4af37; margin-bottom: 30px; }
  input, select, textarea {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border-radius: 8px;
    border: 1px solid #333;
    background: #1a1a1c;
    color: #fff;
    font-size: 15px;
  }
  button {
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    background: #d4af37;
    color: #000;
    font-weight: bold;
    font-size: 15px;
    cursor: pointer;
    margin: 6px 4px 6px 0;
  }
  button.secondary { background: #333; color: #eee; }
  button.danger { background: #a33; color: #fff; }
  .login-box { width: 100%; max-width: 340px; }
  #admin-panel { display: none; padding: 12px; padding-bottom: 60px; }
  header.top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 4px;
    border-bottom: 1px solid #333;
    margin-bottom: 10px;
  }
  nav.tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    margin-bottom: 16px;
    padding-bottom: 4px;
  }
  nav.tabs button {
    background: #1a1a1c;
    color: #ccc;
    white-space: nowrap;
  }
  nav.tabs button.active {
    background: #d4af37;
    color: #000;
  }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .card {
    background: #1a1a1c;
    border: 1px solid #2a2a2c;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .card h3 { margin: 0 0 8px 0; color: #d4af37; }
  .card img.thumb {
    width: 60px; height: 60px; object-fit: cover;
    border-radius: 8px; margin-left: 8px;
  }
  .row { display: flex; align-items: center; gap: 8px; }
  .variant-row {
    display: flex; gap: 6px; margin-bottom: 6px; flex-wrap: wrap;
  }
  .variant-row input { flex: 1; min-width: 70px; }
  label { font-size: 13px; color: #aaa; display: block; margin-top: 8px; }
  .status-msg { padding: 10px; border-radius: 8px; margin: 10px 0; font-size: 14px; }
  .status-ok { background: #14331e; color: #7fd99a; }
  .status-err { background: #331414; color: #ff9a9a; }
  .image-preview { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0; }
  .image-preview img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; }
  .toggle-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #333; margin-left: 6px; }
  .badge.on { background: #14331e; color: #7fd99a; }
  .hidden { display: none; }
</style>
</head>
<body>

<!-- صفحه ورود -->
<div id="login-screen">
  <h1>Shiraz Nuts</h1>
  <div class="login-box">
    <label>ایمیل</label>
    <input type="email" id="login-email" placeholder="ایمیل مدیر">
    <label>رمز عبور</label>
    <input type="password" id="login-pass" placeholder="رمز عبور">
    <button onclick="doLogin()" style="width:100%">ورود</button>
    <div id="login-msg"></div>
  </div>
</div>

<!-- پنل مدیریت -->
<div id="admin-panel">
  <header class="top">
    <strong id="admin-email"></strong>
    <button class="secondary" onclick="doLogout()">خروج</button>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="products">محصولات</button>
    <button class="tab-btn" data-tab="categories">دسته‌بندی‌ها</button>
  </nav>

  <!-- تب محصولات -->
  <div class="tab-content active" id="tab-products">
    <div class="card">
      <h3 id="product-form-title">افزودن محصول جدید</h3>
      <input type="hidden" id="product-id">
      <label>نام محصول</label>
      <input type="text" id="p-name" placeholder="مثلاً پسته اکبری">
      <label>دسته‌بندی</label>
      <select id="p-category"></select>
      <label>توضیحات</label>
      <textarea id="p-desc" rows="2"></textarea>

      <label>عکس‌های محصول</label>
      <input type="file" id="p-images-input" accept="image/*" multiple>
      <div class="image-preview" id="p-images-preview"></div>

      <label>وزن‌ها و قیمت‌ها</label>
      <div id="variants-container"></div>
      <button class="secondary" onclick="addVariantRow()">+ افزودن وزن</button>

      <div class="toggle-row">
        <input type="checkbox" id="p-featured"> <span>محصول ویژه</span>
      </div>
      <div class="toggle-row">
        <input type="checkbox" id="p-active" checked> <span>فعال (نمایش در سایت)</span>
      </div>

      <div style="margin-top:14px">
        <button onclick="saveProduct()">ذخیره محصول</button>
        <button class="secondary" onclick="resetProductForm()">پاک کردن فرم</button>
      </div>
      <div id="product-status"></div>
    </div>

    <h3 style="color:#d4af37">لیست محصولات</h3>
    <div id="products-list"></div>
  </div>

  <!-- تب دسته‌بندی -->
  <div class="tab-content" id="tab-categories">
    <div class="card">
      <h3>افزودن دسته‌بندی</h3>
      <label>نام دسته</label>
      <input type="text" id="c-name" placeholder="مثلاً خشکبار">
      <label>ترتیب نمایش</label>
      <input type="number" id="c-order" value="1">
      <button onclick="saveCategory()">ذخیره دسته‌بندی</button>
      <div id="category-status"></div>
    </div>
    <h3 style="color:#d4af37">لیست دسته‌بندی‌ها</h3>
    <div id="categories-list"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, doc, setDoc, addDoc, getDoc, getDocs,
  deleteDoc, updateDoc, onSnapshot, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ---------- تنظیمات Firebase ----------
const firebaseConfig = {
  apiKey: "AIzaSyApm-LtSjV-jckZILggicF83Cd0fO-77Pw",
  authDomain: "shiraznuts-92e20.firebaseapp.com",
  projectId: "shiraznuts-92e20",
  storageBucket: "shiraznuts-92e20.firebasestorage.app",
  messagingSenderId: "236719692703",
  appId: "1:236719692703:web:2b7ed97a0a80aa1a903baa"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ---------- تنظیمات Cloudinary ----------
const CLOUD_NAME = "ygtxs7im";
const UPLOAD_PRESET = "Shiraznuts_products1";

// ---------- ورود / خروج ----------
window.doLogin = async function () {
  const email = document.getElementById("login-email").value.trim();
  const pass = document.getElementById("login-pass").value;
  const msg = document.getElementById("login-msg");
  msg.innerHTML = "";
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (err) {
    msg.innerHTML = `<div class="status-msg status-err">خطا در ورود: ${err.message}</div>`;
  }
};

window.doLogout = async function () {
  await signOut(auth);
};

onAuthStateChanged(auth, async (user) => {
  if (user) {
    // چک کن که این کاربر توی admins ثبت شده یا نه
    const adminDoc = await getDoc(doc(db, "admins", user.uid));
    if (adminDoc.exists()) {
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("admin-panel").style.display = "block";
      document.getElementById("admin-email").innerText = user.email;
      loadCategories();
      loadProducts();
    } else {
      alert("این حساب دسترسی مدیریت ندارد.");
      await signOut(auth);
    }
  } else {
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("admin-panel").style.display = "none";
  }
});

// ---------- تب‌ها ----------
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("tab-" + btn.dataset.tab).classList.add("active");
  });
});

// ---------- آپلود عکس به Cloudinary ----------
async function uploadImageToCloudinary(file) {
  const url = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`;
  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", UPLOAD_PRESET);
  const res = await fetch(url, { method: "POST", body: formData });
  const data = await res.json();
  if (!data.secure_url) throw new Error("آپلود عکس ناموفق بود");
  return data.secure_url;
}

let uploadedImages = [];

document.getElementById("p-images-input").addEventListener("change", async (e) => {
  const files = Array.from(e.target.files);
  const preview = document.getElementById("p-images-preview");
  for (const file of files) {
    const tempImg = document.createElement("img");
    tempImg.src = URL.createObjectURL(file);
    preview.appendChild(tempImg);
    try {
      const url = await uploadImageToCloudinary(file);
      uploadedImages.push(url);
    } catch (err) {
      alert("خطا در آپلود یکی از عکس‌ها: " + err.message);
    }
  }
  e.target.value = "";
});

// ---------- وزن‌ها (variants) ----------
let variantCount = 0;
window.addVariantRow = function (data = {}) {
  variantCount++;
  const id = "v" + variantCount;
  const container = document.getElementById("variants-container");
  const row = document.createElement("div");
  row.className = "variant-row";
  row.dataset.vid = id;
  row.innerHTML = `
    <input type="text" placeholder="وزن (مثلاً 250g)" class="v-weight" value="${data.weight || ''}">
    <input type="number" placeholder="قیمت" class="v-price" value="${data.price || ''}">
    <input type="number" placeholder="قیمت قبل تخفیف" class="v-oldprice" value="${data.oldPrice || ''}">
    <input type="number" placeholder="موجودی" class="v-stock" value="${data.stock || ''}">
    <button class="danger" type="button" onclick="this.parentElement.remove()">حذف</button>
  `;
  container.appendChild(row);
};

function collectVariants() {
  const rows = document.querySelectorAll("#variants-container .variant-row");
  const variants = [];
  rows.forEach(row => {
    const weight = row.querySelector(".v-weight").value.trim();
    const price = parseFloat(row.querySelector(".v-price").value) || 0;
    const oldPrice = parseFloat(row.querySelector(".v-oldprice").value) || 0;
    const stock = parseInt(row.querySelector(".v-stock").value) || 0;
    if (weight) variants.push({ weight, price, oldPrice, stock });
  });
  return variants;
}

// ---------- دسته‌بندی‌ها ----------
window.saveCategory = async function () {
  const name = document.getElementById("c-name").value.trim();
  const order = parseInt(document.getElementById("c-order").value) || 1;
  const statusEl = document.getElementById("category-status");
  if (!name) { statusEl.innerHTML = `<div class="status-msg status-err">نام دسته را وارد کن</div>`; return; }
  try {
    await addDoc(collection(db, "categories"), { name, order, active: true });
    statusEl.innerHTML = `<div class="status-msg status-ok">دسته‌بندی ذخیره شد ✅</div>`;
    document.getElementById("c-name").value = "";
  } catch (err) {
    statusEl.innerHTML = `<div class="status-msg status-err">خطا: ${err.message}</div>`;
  }
};

function loadCategories() {
  const q = query(collection(db, "categories"), orderBy("order"));
  onSnapshot(q, (snapshot) => {
    const listEl = document.getElementById("categories-list");
    const selectEl = document.getElementById("p-category");
    listEl.innerHTML = "";
    selectEl.innerHTML = "";
    snapshot.forEach(docSnap => {
      const cat = docSnap.data();
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="row" style="justify-content:space-between">
          <span>${cat.name} <span class="badge">ترتیب: ${cat.order}</span></span>
          <button class="danger" onclick="deleteCategory('${docSnap.id}')">حذف</button>
        </div>
      `;
      listEl.appendChild(card);

      const opt = document.createElement("option");
      opt.value = docSnap.id;
      opt.textContent = cat.name;
      selectEl.appendChild(opt);
    });
  });
}

window.deleteCategory = async function (id) {
  if (!confirm("حذف این دسته‌بندی؟")) return;
  await deleteDoc(doc(db, "categories", id));
};

// ---------- محصولات ----------
window.resetProductForm = function () {
  document.getElementById("product-id").value = "";
  document.getElementById("p-name").value = "";
  document.getElementById("p-desc").value = "";
  document.getElementById("p-featured").checked = false;
  document.getElementById("p-active").checked = true;
  document.getElementById("variants-container").innerHTML = "";
  document.getElementById("p-images-preview").innerHTML = "";
  uploadedImages = [];
  document.getElementById("product-form-title").innerText = "افزودن محصول جدید";
  addVariantRow();
};

window.saveProduct = async function () {
  const statusEl = document.getElementById("product-status");
  const id = document.getElementById("product-id").value;
  const name = document.getElementById("p-name").value.trim();
  const categoryId = document.getElementById("p-category").value;
  const description = document.getElementById("p-desc").value.trim();
  const featured = document.getElementById("p-featured").checked;
  const active = document.getElementById("p-active").checked;
  const variants = collectVariants();

  if (!name) { statusEl.innerHTML = `<div class="status-msg status-err">نام محصول را وارد کن</div>`; return; }
  if (variants.length === 0) { statusEl.innerHTML = `<div class="status-msg status-err">حداقل یک وزن اضافه کن</div>`; return; }

  const productData = {
    name, categoryId, description, featured, active, variants,
    images: uploadedImages,
    updatedAt: new Date().toISOString()
  };

  try {
    if (id) {
      await updateDoc(doc(db, "products", id), productData);
    } else {
      productData.createdAt = new Date().toISOString();
      await addDoc(collection(db, "products"), productData);
    }
    statusEl.innerHTML = `<div class="status-msg status-ok">محصول ذخیره شد ✅</div>`;
    resetProductForm();
  } catch (err) {
    statusEl.innerHTML = `<div class="status-msg status-err">خطا: ${err.message}</div>`;
  }
};

window.editProduct = async function (id) {
  const snap = await getDoc(doc(db, "products", id));
  if (!snap.exists()) return;
  const p = snap.data();
  document.getElementById("product-id").value = id;
  document.getElementById("p-name").value = p.name || "";
  document.getElementById("p-category").value = p.categoryId || "";
  document.getElementById("p-desc").value = p.description || "";
  document.getElementById("p-featured").checked = !!p.featured;
  document.getElementById("p-active").checked = p.active !== false;
  document.getElementById("product-form-title").innerText = "ویرایش محصول";

  uploadedImages = p.images || [];
  const preview = document.getElementById("p-images-preview");
  preview.innerHTML = "";
  uploadedImages.forEach(url => {
    const img = document.createElement("img");
    img.src = url;
    preview.appendChild(img);
  });

  document.getElementById("variants-container").innerHTML = "";
  (p.variants || []).forEach(v => addVariantRow(v));

  window.scrollTo(0, 0);
};

window.deleteProduct = async function (id) {
  if (!confirm("حذف این محصول؟")) return;
  await deleteDoc(doc(db, "products", id));
};

function loadProducts() {
  const q = query(collection(db, "products"), orderBy("createdAt", "desc"));
  onSnapshot(q, (snapshot) => {
    const listEl = document.getElementById("products-list");
    listEl.innerHTML = "";
    snapshot.forEach(docSnap => {
      const p = docSnap.data();
      const card = document.createElement("div");
      card.className = "card";
      const img = (p.images && p.images[0]) ? `<img class="thumb" src="${p.images[0]}">` : "";
      const variantsText = (p.variants || []).map(v => `${v.weight}: ${v.price} ريال`).join(" | ");
      card.innerHTML = `
        <div class="row">
          ${img}
          <div>
            <strong>${p.name}</strong>
            <span class="badge ${p.active !== false ? 'on' : ''}">${p.active !== false ? 'فعال' : 'غیرفعال'}</span>
            ${p.featured ? '<span class="badge on">ویژه</span>' : ''}
            <div style="font-size:13px;color:#aaa">${variantsText}</div>
          </div>
        </div>
        <div style="margin-top:8px">
          <button class="secondary" onclick="editProduct('${docSnap.id}')">ویرایش</button>
          <button class="danger" onclick="deleteProduct('${docSnap.id}')">حذف</button>
        </div>
      `;
      listEl.appendChild(card);
    });
  });
}

// شروع با یک ردیف وزن خالی
addVariantRow();
</script>
</body>
</html>

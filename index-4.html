<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shiraz Nuts | متجر فاخر</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Tahoma', Arial, sans-serif;
    background: linear-gradient(180deg, #0c0c0d 0%, #141210 100%);
    color: #f0e9dc;
    padding-bottom: 70px;
    min-height: 100vh;
  }
  ::-webkit-scrollbar { display: none; }

  header.site {
    text-align: center;
    padding: 30px 12px 16px;
    position: relative;
  }
  header.site h1 {
    color: #d4af37;
    font-size: 30px;
    letter-spacing: 1px;
    text-shadow: 0 0 20px rgba(212,175,55,0.3);
  }
  header.site p { color: #a89a7d; font-size: 13px; margin-top: 6px; letter-spacing: 1px; }
  .gold-line { width: 60px; height: 2px; background: linear-gradient(90deg, transparent, #d4af37, transparent); margin: 14px auto 0; }

  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    color: #d4af37; font-size: 14px; padding: 10px 16px;
    cursor: pointer;
  }

  /* صفحه اصلی: کارت‌های دسته‌بندی */
  .banner-wrap { display:flex; overflow-x:auto; gap:10px; padding: 0 12px 12px; scroll-snap-type:x mandatory; }
  .banner-wrap img { width:100%; min-width:90%; height:130px; object-fit:cover; border-radius:16px; scroll-snap-align:start; border:1px solid rgba(212,175,55,0.25); cursor:pointer; }

  .cat-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 16px;
  }
  .cat-card {
    position: relative; border-radius: 18px; overflow: hidden;
    height: 150px; cursor: pointer;
    border: 1px solid rgba(212,175,55,0.25);
    transition: transform 0.2s ease;
  }
  .cat-card:active { transform: scale(0.96); }
  .cat-card img {
    width: 100%; height: 100%; object-fit: cover;
    filter: brightness(0.55);
  }
  .cat-card .label {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 14px; text-align: center;
    background: linear-gradient(0deg, rgba(0,0,0,0.85), transparent);
  }
  .cat-card .label span {
    color: #f0e9dc; font-size: 17px; font-weight: bold;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
  }
  .cat-card.no-img { background: linear-gradient(135deg, #1a1a1c, #24211a); display:flex; align-items:center; justify-content:center; }

  /* صفحه دسته: گرید محصولات */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
  .product-card {
    background: #171614; border: 1px solid rgba(212,175,55,0.15);
    border-radius: 16px; overflow: hidden; cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,0.35);
    transition: transform 0.15s ease;
  }
  .product-card:active { transform: scale(0.97); }
  .product-card img { width: 100%; height: 125px; object-fit: cover; background:#222; }
  .product-card .info { padding: 10px; }
  .product-card .name { font-size: 14px; color: #f0e9dc; margin-bottom: 5px; }
  .product-card .price { color: #d4af37; font-size: 13px; font-weight: bold; }
  .product-card .old-price { color: #776a52; text-decoration: line-through; font-size: 11px; margin-left: 6px; }
  .badge-featured {
    position: absolute; background: linear-gradient(135deg,#d4af37,#f5d576); color: #000;
    font-size: 10px; font-weight:bold; padding: 3px 8px; border-radius: 8px; margin: 8px;
  }
  .card-img-wrap { position: relative; }
  .empty-msg { text-align: center; color: #776a52; padding: 50px 20px; grid-column: 1/-1; }

  /* صفحه محصول */
  #product-page { display:none; padding-bottom: 80px; }
  .gallery { display:flex; overflow-x:auto; scroll-snap-type:x mandatory; }
  .gallery img { width:100%; flex-shrink:0; scroll-snap-align:start; height:260px; object-fit:cover; }
  .product-detail { padding: 16px; }
  .product-detail h2 { color:#d4af37; font-size:22px; margin-bottom:8px; }
  .product-detail p.desc { color:#b3a688; font-size:14px; line-height:1.6; margin-bottom:16px; }
  .model-tabs { display:flex; gap:8px; overflow-x:auto; margin-bottom:14px; }
  .model-tabs button {
    white-space:nowrap; background:#1a1a1c; color:#ccc; border:1px solid rgba(212,175,55,0.2);
    border-radius:20px; padding:8px 16px; font-size:13px;
  }
  .model-tabs button.active { background:#d4af37; color:#000; border-color:#d4af37; }

  .weight-options { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; }
  .weight-options button {
    background:#1e1c18; color:#e6dcc4; border:1px solid rgba(212,175,55,0.25);
    border-radius:10px; padding:10px 14px; font-size:14px;
  }
  .weight-options button.active { background:#d4af37; color:#000; border-color:#d4af37; }
  .custom-weight-box { display:flex; gap:8px; align-items:center; margin: 10px 0; }
  .custom-weight-box input {
    flex:1; padding:12px; border-radius:10px; border:1px solid #333; background:#1a1a1c; color:#fff; font-size:15px;
  }
  .qty-selector { display:flex; align-items:center; gap:14px; margin: 12px 0; }
  .qty-selector button {
    width:40px; height:40px; border-radius:10px; background:#1a1a1c; color:#fff; border:1px solid #333; font-size:18px;
  }
  .price-live { font-size:24px; color:#d4af37; font-weight:bold; margin: 14px 0; }
  .add-cart-btn {
    width:100%; background: linear-gradient(135deg,#d4af37,#b8932c); color:#000; border:none;
    padding:15px; border-radius:12px; font-weight:bold; font-size:16px;
  }
  .close-btn {
    position:absolute; left:16px; top:16px; background:rgba(0,0,0,0.5); color:#fff;
    border-radius:50%; width:36px; height:36px; display:flex; align-items:center; justify-content:center; z-index:5;
  }

  /* سبد خرید */
  .cart-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: linear-gradient(135deg,#d4af37,#b8932c); color: #000;
    display: none; justify-content: space-between; align-items: center;
    padding: 16px 20px; font-weight: bold; cursor: pointer;
  }
  .cart-bar.show { display: flex; }

  .modal-bg {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:50; align-items:flex-end;
  }
  .modal-bg.active { display:flex; }
  .modal { background:#161512; width:100%; border-radius:20px 20px 0 0; padding:18px; max-height:85vh; overflow-y:auto; }
  .cart-item { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #2a2a2c; }
  .qty-btns button { background:#2a2a2c; color:#fff; border:none; width:28px; height:28px; border-radius:6px; }
  .checkout-btn {
    width:100%; background:#25D366; color:#fff; border:none;
    padding:15px; border-radius:12px; font-weight:bold; font-size:16px; margin-top:16px;
  }
</style>
</head>
<body>

<!-- صفحه اصلی: دسته‌بندی‌ها -->
<div id="home-page">
  <header class="site">
    <h1>Shiraz Nuts</h1>
    <p>خشكبات وزعفران فاخر</p>
    <div class="gold-line"></div>
  </header>
  <div class="banner-wrap" id="banner-wrap"></div>
  <div class="cat-grid" id="cats-grid"></div>
</div>

<!-- صفحه دسته: لیست محصولات -->
<div id="category-page" style="display:none">
  <header class="site" style="text-align:right;padding:16px">
    <span class="back-btn" onclick="goHome()">→ رجوع</span>
    <h1 id="category-title" style="font-size:22px;text-align:center;margin-top:6px"></h1>
  </header>
  <div class="grid" id="products-grid"></div>
</div>

<!-- صفحه محصول -->
<div id="product-page">
  <div class="close-btn" onclick="goBackFromProduct()">✕</div>
  <div class="gallery" id="product-gallery"></div>
  <div class="product-detail">
    <h2 id="pd-name"></h2>
    <p class="desc" id="pd-desc"></p>

    <div class="model-tabs" id="pd-models"></div>

    <div id="weight-section">
      <label style="color:#a89a7d;font-size:13px">الوزن</label>
      <div class="weight-options" id="pd-weight-options"></div>
      <div class="custom-weight-box" id="pd-custom-weight-box">
        <div style="flex:1">
          <label style="color:#a89a7d;font-size:12px">وزن مخصص (جرام)</label>
          <input type="number" id="pd-custom-weight" placeholder="مثلاً 375" oninput="onCustomWeightInput()">
        </div>
        <div style="flex:1">
          <label style="color:#a89a7d;font-size:12px">أو مبلغ مخصص (ريال)</label>
          <input type="number" id="pd-custom-price" placeholder="مثلاً 3" oninput="onCustomPriceInput()">
        </div>
      </div>
    </div>

    <div id="unit-section" style="display:none">
      <label style="color:#a89a7d;font-size:13px">الكمية</label>
      <div class="qty-selector">
        <button onclick="changeUnitQty(-1)">-</button>
        <span id="pd-unit-qty">1</span>
        <button onclick="changeUnitQty(1)">+</button>
      </div>
    </div>

    <div class="price-live" id="pd-price-live"></div>
    <button class="add-cart-btn" onclick="addToCart()">أضف إلى السلة</button>
  </div>
</div>

<!-- نوار سبد خرید -->
<div class="cart-bar" id="cart-bar" onclick="openCartModal()">
  <span id="cart-count">0 منتج</span>
  <span id="cart-total">0 ريال</span>
</div>

<!-- Modal سبد خرید -->
<div class="modal-bg" id="cart-modal-bg">
  <div class="modal" style="position:relative">
    <div class="close-btn" style="position:absolute;left:16px;top:16px" onclick="closeCartModal()">✕</div>
    <h2 style="color:#d4af37;margin-bottom:12px">سلة التسوق</h2>
    <div id="cart-items"></div>
    <div style="margin-top:12px;font-weight:bold;color:#d4af37" id="cart-total-line"></div>
    <label style="color:#a89a7d;font-size:13px;margin-top:10px">اسمك</label>
    <input type="text" id="customer-name" placeholder="الاسم الكامل" style="width:100%;padding:12px;border-radius:10px;border:1px solid #333;background:#1a1a1c;color:#fff;margin-top:4px">
    <label style="color:#a89a7d;font-size:13px;margin-top:10px">رقم الهاتف</label>
    <input type="tel" id="customer-phone" placeholder="مثلاً 91234567" style="width:100%;padding:12px;border-radius:10px;border:1px solid #333;background:#1a1a1c;color:#fff;margin-top:4px">
    <button class="checkout-btn" onclick="sendWhatsAppOrder()">إرسال الطلب عبر واتساب</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyApm-LtSjV-jckZILggicF83Cd0fO-77Pw",
  authDomain: "shiraznuts-92e20.firebaseapp.com",
  projectId: "shiraznuts-92e20",
  storageBucket: "shiraznuts-92e20.firebasestorage.app",
  messagingSenderId: "236719692703",
  appId: "1:236719692703:web:2b7ed97a0a80aa1a903baa"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ⚠️ شماره واتساپ فروشگاه (با کد کشور، بدون + یا صفر اول)
const WHATSAPP_NUMBER = "96898779009";

let allCategories = [];
let allProducts = [];
let currentCategoryId = null;
let currentProduct = null;
let currentModelIndex = 0;
let currentWeight = null;
let currentUnitQty = 1;
let cart = JSON.parse(localStorage.getItem("shiraznuts_cart") || "[]");

// ---------- بارگذاری داده ----------
async function loadData() {
  const catSnap = await getDocs(query(collection(db, "categories"), orderBy("order")));
  allCategories = [];
  catSnap.forEach(d => allCategories.push({ id: d.id, ...d.data() }));

  const prodSnap = await getDocs(query(collection(db, "products"), orderBy("createdAt", "desc")));
  allProducts = [];
  prodSnap.forEach(d => allProducts.push({ id: d.id, ...d.data() }));

  const bannerSnap = await getDocs(query(collection(db, "banners"), orderBy("order")));
  const banners = [];
  bannerSnap.forEach(d => banners.push({ id: d.id, ...d.data() }));
  renderBanners(banners);

  renderCategoryGrid();
}

function renderBanners(banners) {
  const wrap = document.getElementById("banner-wrap");
  wrap.innerHTML = "";
  banners.filter(b => b.active !== false).forEach(b => {
    const img = document.createElement("img");
    img.src = b.image;
    if (b.link) img.onclick = () => openCategory(b.link);
    wrap.appendChild(img);
  });
}

function renderCategoryGrid() {
  const grid = document.getElementById("cats-grid");
  grid.innerHTML = "";
  allCategories.filter(c => c.active !== false).forEach(cat => {
    const card = document.createElement("div");
    card.className = "cat-card" + (cat.image ? "" : " no-img");
    card.onclick = () => openCategory(cat.id);
    if (cat.image) {
      card.innerHTML = `<img src="${cat.image}"><div class="label"><span>${cat.name}</span></div>`;
    } else {
      card.innerHTML = `<div class="label" style="position:static;background:none"><span>${cat.name}</span></div>`;
    }
    grid.appendChild(card);
  });
}

// ---------- صفحه دسته ----------
window.openCategory = function (categoryId) {
  currentCategoryId = categoryId;
  const cat = allCategories.find(c => c.id === categoryId);
  document.getElementById("category-title").innerText = cat ? cat.name : "";
  document.getElementById("home-page").style.display = "none";
  document.getElementById("category-page").style.display = "block";
  renderProductsGrid();
  window.scrollTo(0,0);
};

window.goHome = function () {
  document.getElementById("home-page").style.display = "block";
  document.getElementById("category-page").style.display = "none";
};

function cheapestModelPrice(p) {
  if (!p.models || p.models.length === 0) return { price: 0, oldPrice: 0 };
  if (p.saleType === "unit") {
    const m = p.models.slice().sort((a,b)=>a.price-b.price)[0];
    return { price: m.price, oldPrice: 0 };
  } else {
    const m = p.models.slice().sort((a,b)=>a.pricePerKg-b.pricePerKg)[0];
    const preset = (m.presetWeights && m.presetWeights[0]) || 1000;
    return { price: Math.round((m.pricePerKg * preset / 1000) * 100) / 100, oldPrice: 0 };
  }
}

function renderProductsGrid() {
  const grid = document.getElementById("products-grid");
  grid.innerHTML = "";
  const filtered = allProducts.filter(p => p.active !== false && p.categoryId === currentCategoryId);
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-msg">لا توجد منتجات في هذا القسم</div>`;
    return;
  }
  filtered.forEach(p => {
    const img = (p.images && p.images[0]) || (p.models && p.models[0] && p.models[0].image) || "";
    const priceInfo = cheapestModelPrice(p);
    const card = document.createElement("div");
    card.className = "product-card";
    card.onclick = () => openProduct(p);
    card.innerHTML = `
      <div class="card-img-wrap">
        ${p.featured ? '<span class="badge-featured">⭐ مميز</span>' : ''}
        <img src="${img}" loading="lazy">
      </div>
      <div class="info">
        <div class="name">${p.name}</div>
        <div class="price">${priceInfo.price} ريال ${p.saleType === 'weight' ? '(تقريبي)' : ''}</div>
      </div>
    `;
    grid.appendChild(card);
  });
}

// ---------- صفحه محصول ----------
window.openProduct = function (p) {
  currentProduct = p;
  currentModelIndex = 0;
  currentWeight = null;
  currentUnitQty = 1;

  document.getElementById("category-page").style.display = "none";
  document.getElementById("product-page").style.display = "block";
  window.scrollTo(0,0);

  document.getElementById("pd-name").innerText = p.name;
  document.getElementById("pd-desc").innerText = p.description || "";

  const gallery = document.getElementById("product-gallery");
  gallery.innerHTML = "";
  const imgs = (p.images && p.images.length) ? p.images : [(p.models[0] && p.models[0].image) || ""];
  imgs.forEach(url => {
    const img = document.createElement("img");
    img.src = url;
    gallery.appendChild(img);
  });

  const modelsTabs = document.getElementById("pd-models");
  modelsTabs.innerHTML = "";
  (p.models || []).forEach((m, idx) => {
    const btn = document.createElement("button");
    btn.innerText = m.name;
    btn.className = idx === 0 ? "active" : "";
    btn.onclick = () => {
      currentModelIndex = idx;
      document.querySelectorAll("#pd-models button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentWeight = null;
      renderModelOptions();
    };
    modelsTabs.appendChild(btn);
  });

  document.getElementById("weight-section").style.display = p.saleType === "weight" ? "block" : "none";
  document.getElementById("unit-section").style.display = p.saleType === "unit" ? "block" : "none";

  renderModelOptions();
};

function renderModelOptions() {
  const p = currentProduct;
  const model = p.models[currentModelIndex];
  document.getElementById("pd-custom-weight").value = "";
  document.getElementById("pd-custom-price").value = "";
  if (p.saleType === "weight") {
    const optionsEl = document.getElementById("pd-weight-options");
    optionsEl.innerHTML = "";
    (model.presetWeights || []).forEach(w => {
      const btn = document.createElement("button");
      btn.innerText = w >= 1000 ? (w/1000) + " كجم" : w + " جم";
      btn.onclick = () => {
        currentWeight = w;
        document.querySelectorAll("#pd-weight-options button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById("pd-custom-weight").value = "";
        document.getElementById("pd-custom-price").value = "";
        updateLivePrice();
      };
      optionsEl.appendChild(btn);
    });
    document.getElementById("pd-custom-weight-box").style.display = model.allowCustomWeight ? "flex" : "none";
    if (model.presetWeights && model.presetWeights.length) {
      currentWeight = model.presetWeights[0];
      optionsEl.firstChild && optionsEl.firstChild.classList.add("active");
    }
  } else {
    currentUnitQty = 1;
    document.getElementById("pd-unit-qty").innerText = 1;
  }
  updateLivePrice();
}

window.onCustomWeightInput = function () {
  const val = parseFloat(document.getElementById("pd-custom-weight").value);
  const p = currentProduct;
  const model = p.models[currentModelIndex];
  if (val > 0) {
    currentWeight = val;
    document.querySelectorAll("#pd-weight-options button").forEach(b => b.classList.remove("active"));
    const price = Math.round((model.pricePerKg * val / 1000) * 100) / 100;
    document.getElementById("pd-custom-price").value = price;
    updateLivePrice();
  } else {
    currentWeight = null;
    document.getElementById("pd-custom-price").value = "";
    updateLivePrice();
  }
};

window.onCustomPriceInput = function () {
  const val = parseFloat(document.getElementById("pd-custom-price").value);
  const p = currentProduct;
  const model = p.models[currentModelIndex];
  if (val > 0 && model.pricePerKg > 0) {
    const grams = Math.round((val / model.pricePerKg) * 1000);
    currentWeight = grams;
    document.querySelectorAll("#pd-weight-options button").forEach(b => b.classList.remove("active"));
    document.getElementById("pd-custom-weight").value = grams;
    updateLivePrice();
  } else {
    currentWeight = null;
    document.getElementById("pd-custom-weight").value = "";
    updateLivePrice();
  }
};

window.changeUnitQty = function (delta) {
  currentUnitQty = Math.max(1, currentUnitQty + delta);
  document.getElementById("pd-unit-qty").innerText = currentUnitQty;
  updateLivePrice();
};

function updateLivePrice() {
  const p = currentProduct;
  const model = p.models[currentModelIndex];
  let price = 0;
  if (p.saleType === "weight") {
    price = currentWeight ? Math.round((model.pricePerKg * currentWeight / 1000) * 100) / 100 : 0;
  } else {
    price = Math.round(model.price * currentUnitQty * 100) / 100;
  }
  document.getElementById("pd-price-live").innerText = price + " ريال";
}

window.goBackFromProduct = function () {
  document.getElementById("product-page").style.display = "none";
  document.getElementById("category-page").style.display = "block";
};

window.addToCart = function () {
  const p = currentProduct;
  const model = p.models[currentModelIndex];
  let item;
  if (p.saleType === "weight") {
    if (!currentWeight) { alert("الرجاء اختيار الوزن"); return; }
    const price = Math.round((model.pricePerKg * currentWeight / 1000) * 100) / 100;
    item = {
      productId: p.id, name: p.name, model: model.name,
      variant: currentWeight >= 1000 ? (currentWeight/1000)+" كجم" : currentWeight+" جم",
      unitPrice: price, qty: 1, lineTotal: price
    };
  } else {
    const price = Math.round(model.price * currentUnitQty * 100) / 100;
    item = {
      productId: p.id, name: p.name, model: model.name,
      variant: currentUnitQty + " عدد",
      unitPrice: model.price, qty: currentUnitQty, lineTotal: price
    };
  }
  const existing = cart.find(c => c.productId === item.productId && c.model === item.model && c.variant === item.variant);
  if (existing) { existing.qty += item.qty; existing.lineTotal += item.lineTotal; }
  else { cart.push(item); }
  saveCart();
  goBackFromProduct();
};

// ---------- سبد خرید ----------
function saveCart() {
  localStorage.setItem("shiraznuts_cart", JSON.stringify(cart));
  renderCartBar();
}
function renderCartBar() {
  const bar = document.getElementById("cart-bar");
  const totalQty = cart.reduce((s,c)=>s+ (c.qty || 1), 0);
  const totalPrice = cart.reduce((s,c)=>s+c.lineTotal, 0);
  if (totalQty > 0) {
    bar.classList.add("show");
    document.getElementById("cart-count").innerText = totalQty + " منتج";
    document.getElementById("cart-total").innerText = totalPrice.toFixed(2) + " ريال";
  } else { bar.classList.remove("show"); }
}
window.openCartModal = function () { renderCartItems(); document.getElementById("cart-modal-bg").classList.add("active"); };
window.closeCartModal = function () { document.getElementById("cart-modal-bg").classList.remove("active"); };

function renderCartItems() {
  const container = document.getElementById("cart-items");
  container.innerHTML = "";
  if (cart.length === 0) container.innerHTML = `<div class="empty-msg">السلة فارغة</div>`;
  cart.forEach((item, idx) => {
    const row = document.createElement("div");
    row.className = "cart-item";
    row.innerHTML = `
      <div>
        <div>${item.name} - ${item.model} (${item.variant})</div>
        <div style="color:#d4af37;font-size:13px">${item.lineTotal.toFixed(2)} ريال</div>
      </div>
      <button onclick="removeFromCart(${idx})" style="background:#a33;color:#fff;border:none;border-radius:6px;padding:6px 10px">حذف</button>
    `;
    container.appendChild(row);
  });
  const total = cart.reduce((s,c)=>s+c.lineTotal, 0);
  document.getElementById("cart-total-line").innerText = "المجموع: " + total.toFixed(2) + " ريال";
}
window.removeFromCart = function (idx) { cart.splice(idx,1); saveCart(); renderCartItems(); };

window.sendWhatsAppOrder = async function () {
  if (cart.length === 0) return;
  const customerName = document.getElementById("customer-name").value.trim();
  const customerPhone = document.getElementById("customer-phone").value.trim();
  if (!customerName || !customerPhone) { alert("الرجاء إدخال الاسم ورقم الهاتف"); return; }

  const total = cart.reduce((s,c)=>s+c.lineTotal, 0);

  try {
    await addDoc(collection(db, "orders"), {
      customerName, phone: customerPhone,
      items: cart, total, status: "pending",
      createdAt: new Date().toISOString()
    });
  } catch (err) {
    console.error("خطأ في حفظ الطلب:", err);
  }

  let msg = `مرحباً، طلب جديد من ${customerName}:\n\n`;
  cart.forEach(item => {
    msg += `${item.name} - ${item.model} (${item.variant})\n${item.lineTotal.toFixed(2)} ريال\n---------\n`;
  });
  msg += `\nالمجموع: ${total.toFixed(2)} ريال\nرقم الهاتف: ${customerPhone}`;
  window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, "_blank");

  cart = [];
  saveCart();
  closeCartModal();
};

renderCartBar();
loadData();
</script>
</body>
</html>
